name: Health Check

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: node scripts/build-catalog.js

      - run: node scripts/health-check.js

      - name: Copy data to docs
        run: |
          cp data/apis.json docs/apis.json
          cp status/results.json docs/results.json

      - name: Commit results
        run: |
          git config user.name "nocard-bot"
          git config user.email "bot@nocard-apis.dev"
          git add status/ docs/apis.json docs/results.json
          git diff --cached --quiet || git commit -m "chore: health check $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
