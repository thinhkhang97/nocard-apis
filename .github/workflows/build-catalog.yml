name: Build Catalog

on:
  push:
    branches: [main]
    paths:
      - 'data/apis.yaml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: node scripts/build-catalog.js

      - name: Copy to docs
        run: cp data/apis.json docs/apis.json

      - name: Commit if changed
        run: |
          git config user.name "nocard-bot"
          git config user.email "bot@nocard-apis.dev"
          git add data/apis.json docs/apis.json
          git diff --cached --quiet || git commit -m "chore: rebuild catalog"
          git push
